<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
        .stat-card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .bg-gradient-primary { background: linear-gradient(45deg, #4e73df, #224abe); color: white; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="bg-light p-4">

<div class="container-fluid">
  <h3 class="fw-bold text-dark mb-4">Báo Cáo Phân Tích Nhân Sự</h3>

  <div class="row g-4 mb-4">
    <div class="col-md-6 col-lg-4">
      <div class="card stat-card shadow-sm p-4 bg-gradient-primary">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-2 opacity-75">Lương Trung Bình</h6>
            <h2 id="avg-luong-display" class="fw-bold mb-0">Đang tải...</h2>
          </div>
          <i class="fas fa-money-bill-wave fa-3x opacity-25"></i>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-8">
      <div class="card stat-card shadow-sm p-4 bg-white">
        <h6 class="text-muted text-uppercase mb-3">Chi tiết trình độ</h6>
        <div id="list-bang-cap" class="d-flex flex-wrap gap-2">
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-4">Biểu đồ cơ cấu bằng cấp</h5>
        <div class="chart-container">
          <canvas id="chartBangCap"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/thong-ke/data')
                .then(res => res.json())
                .then(data => {
                    // 1. Hiển thị lương
                    const luong = parseFloat(data.avgLuong) || 0;
                    document.getElementById('avg-luong-display').innerText = 
                        new Intl.NumberFormat('vi-VN').format(luong) + " VNĐ";

                    // 2. Đổ danh sách nhãn bằng cấp
                    const listBC = document.getElementById('list-bang-cap');
                    const entries = Object.entries(data.bangCapData || {});
                    
                    listBC.innerHTML = entries.map(([key, val]) => `
                        <div class="badge bg-light text-dark border p-2">
                            <i class="fas fa-graduation-cap text-primary me-2"></i>
                            ${key}: <span class="fw-bold">${val}</span>
                        </div>
                    `).join('');

                    // 3. Vẽ biểu đồ Bar Chart
                    const ctx = document.getElementById('chartBangCap').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: entries.map(e => e[0]),
                            datasets: [{
                                label: 'Số lượng nhân viên',
                                data: entries.map(e => e[1]),
                                backgroundColor: 'rgba(78, 115, 223, 0.8)',
                                borderColor: 'rgba(78, 115, 223, 1)',
                                borderWidth: 1,
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: { beginAtZero: true, grid: { drawBorder: false } },
                                x: { grid: { display: false } }
                            },
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                })
                .catch(err => {
                    document.getElementById('avg-luong-display').innerText = "Lỗi dữ liệu";
                    console.error("Error:", err);
                });
        });
    </script>
</body>
</html>
