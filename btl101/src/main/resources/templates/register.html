<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="card mx-auto p-4 shadow-sm" style="width: 400px;">
    <h4 class="fw-bold mb-4">Tạo tài khoản mới</h4>
    <form th:action="@{/register}" method="post">
        <div class="mb-3"><label>Tên đăng nhập</label><input type="text" name="username" class="form-control" required></div>
        <div class="mb-3"><label>Mật khẩu</label><input type="password" name="password" class="form-control" required></div>
        <button type="submit" class="btn btn-success w-100">Đăng ký ngay</button>
        <a th:href="@{/login}" class="btn btn-link w-100 mt-2 text-decoration-none">Quay lại đăng nhập</a>
    </form>
</div>
</body>
</html>
