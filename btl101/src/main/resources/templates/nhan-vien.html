<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh Sách Nhân Viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
        /* Giữ nguyên CSS cũ của bạn hoặc dùng Style dưới đây cho chuyên nghiệp */
        :root { --primary: #4e73df; --sidebar-w: 250px; }
        body { background: #f8f9fc; display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: var(--sidebar-w); background: var(--primary); color: white; height: 100vh; position: fixed; }
        .main-body { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); padding: 30px; }
        .table-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15); }
    </style>
</head>
<body>
<div class="sidebar shadow">
  <div class="p-4 text-center border-bottom border-white border-opacity-10 mb-2">
    <h5 class="fw-bold">HR SYSTEM</h5>
  </div>
  <nav class="nav flex-column">
    <a class="nav-link text-white" th:href="@{/home}"><i class="fas fa-home me-2"></i> Dashboard</a>
    <a class="nav-link text-white active fw-bold" th:href="@{/nhan-vien}"><i class="fas fa-users me-2"></i> Nhân Viên</a>
  </nav>
</div>

<div class="main-body">
  <h3 class="fw-bold text-dark mb-4">QUẢN LÝ NHÂN VIÊN</h3>

  <div class="table-container">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-light text-center">
      <tr>
        <th>MaNV</th>
        <th>TenNV</th>
        <th>Tuoi</th>
        <th>Luong</th>
        <th>BangCap</th>
        <th>PhongBan</th>
        <th>SoNamLamViec</th>
        <th>SoNgayNghiPhep</th>
        <th>Thao Tác</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="nv : ${dsNV}">
        <td class="text-center fw-bold text-primary" th:text="${nv.maNV}"></td>
        <td th:text="${nv.tenNV}"></td>
        <td class="text-center" th:text="${nv.tuoi}"></td>
        <td class="text-end text-success fw-bold"
            th:text="${#numbers.formatDecimal(nv.luong, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
        <td th:text="${nv.bangCap}"></td>
        <td class="text-center">
          <span class="badge bg-primary" th:text="${nv.phongBan}"></span>
        </td>
        <td class="text-center" th:text="${nv.soNamLamViec} + ' năm'"></td>
        <td class="text-center text-danger fw-bold" th:text="${nv.soNgayNghiPhep} + ' ngày'"></td>
        <td class="text-center">
          <button class="btn btn-sm btn-info text-white"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
