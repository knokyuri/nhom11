<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập - HRM System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
        body { background: #eef2f3; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 380px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="card p-4">
  <h3 class="text-center fw-bold text-primary mb-4">ĐĂNG NHẬP</h3>
  <div th:if="${param.error}" class="alert alert-danger py-2 small">Sai tài khoản hoặc mật khẩu!</div>
  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">VÀO HỆ THỐNG</button>
    <div class="text-center mt-3 small">
      Chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none">Đăng ký</a> | <a th:href="@{/forgot}" class="text-muted text-decoration-none">Quên mật khẩu?</a>
    </div>
  </form>
</div>
</body>
</html>
