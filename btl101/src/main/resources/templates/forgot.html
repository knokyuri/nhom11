<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Khôi phục mật khẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="card mx-auto p-4 shadow-sm" style="width: 400px;">
  <h4 class="fw-bold mb-3">Đổi mật khẩu</h4>
  <form th:action="@{/forgot}" method="post">
    <div class="mb-3"><label>Nhập username của bạn</label><input type="text" name="username" class="form-control" required></div>
    <div class="mb-3"><label>Mật khẩu mới</label><input type="password" name="newPassword" class="form-control" required></div>
    <button type="submit" class="btn btn-warning w-100">Cập nhật mật khẩu</button>
    <a th:href="@{/login}" class="btn btn-link w-100 mt-2 text-decoration-none">Hủy bỏ</a>
  </form>
</div>
</body>
</html>
