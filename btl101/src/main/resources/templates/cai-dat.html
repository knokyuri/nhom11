<div class="main-content">
  <h3 class="fw-bold mb-4">Cài đặt hệ thống</h3>
  <div class="row">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-3">Thông tin tài khoản</h5>
        <div class="mb-3">
          <label class="form-label small">Tên đăng nhập</label>
          <input type="text" class="form-control" th:value="${session.user.tenDangNhap}" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label small">Họ và tên</label>
          <input type="text" class="form-control" th:value="${session.user.hoTen}">
        </div>
        <button class="btn btn-primary w-100">Cập nhật thông tin</button>
      </div>
    </div>
  </div>
</div>
