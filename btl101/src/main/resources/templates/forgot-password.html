<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 15px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="card p-4">
  <h4 class="text-center fw-bold mb-4">KHÔI PHỤC MẬT KHẨU</h4>
  <div th:if="${param.error}" class="alert alert-danger small">Tài khoản không tồn tại!</div>
  <form th:action="@{/forgot-password}" method="post">
    <div class="mb-3">
      <label class="form-label small fw-bold">Tên đăng nhập</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-bold">Mật khẩu mới</label>
      <input type="password" name="newPassword" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-bold">ĐẶT LẠI MẬT KHẨU</button>
  </form>
  <div class="mt-3 text-center">
    <a th:href="@{/login}" class="text-decoration-none small">Quay lại đăng nhập</a>
  </div>
</div>
</body>
</html>
